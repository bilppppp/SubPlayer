<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubPlayer Helper</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --card: #141416;
      --border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --text-muted: #8e8e93;
      --indigo: #6366f1;
      --purple: #a855f7;
      --error: #ef4444;
      --success: #22c55e;
      --warn: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .logo {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 700;
    }
    .header h1 { font-size: 14px; font-weight: 600; }

    .status-bar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.active { background: var(--success); }
    .status-dot.error { background: var(--error); }

    .preprocess-summary {
      margin: 8px 16px 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      background: rgba(255,255,255,0.03);
    }
    .preprocess-summary.active {
      border-color: rgba(99,102,241,.45);
      color: #c7d2fe;
      background: rgba(99,102,241,.12);
    }
    .preprocess-summary.done {
      border-color: rgba(34,197,94,.45);
      color: #bbf7d0;
      background: rgba(34,197,94,.12);
    }
    .preprocess-summary.error {
      border-color: rgba(239,68,68,.45);
      color: #fecaca;
      background: rgba(239,68,68,.12);
    }
    .hidden { display: none; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .section h2 {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, var(--indigo), var(--purple)); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,.06); border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.4); color: #fecaca; }

    .input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      padding: 8px;
      margin-bottom: 8px;
    }
    .item.item-processing { border-color: rgba(99,102,241,.45); }
    .item.item-done { border-color: rgba(34,197,94,.45); }
    .item.item-failed { border-color: rgba(239,68,68,.45); }

    .item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .item-title {
      font-size: 12px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .job-badge {
      font-size: 10px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .job-badge.processing { color: #c7d2fe; border-color: rgba(99,102,241,.45); }
    .job-badge.done { color: #bbf7d0; border-color: rgba(34,197,94,.45); }
    .job-badge.failed { color: #fecaca; border-color: rgba(239,68,68,.45); }
    .job-badge.queued { color: #fde68a; border-color: rgba(245,158,11,.45); }

    .item-url {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 6px;
    }
    .item-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .item-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .item-lang-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
    }

    .lang-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .lang-label {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .item-export {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .lang-select {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 12px;
      min-width: 0;
    }

    .item-progress {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      margin-bottom: 4px;
    }
    .item-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--indigo), var(--purple));
    }

    .item-job-msg {
      font-size: 10px;
      color: var(--text-muted);
    }

    .empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      padding: 24px;
      font-size: 12px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">SP</div>
    <h1>SubPlayer Helper</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText" style="color: var(--text-muted); font-size: 12px;">就绪</span>
  </div>

  <div id="preprocessSummary" class="preprocess-summary hidden"></div>

  <div class="section">
    <h2>API</h2>
    <input id="apiBaseInput" class="input" placeholder="https://your-domain.com" />
    <div class="row">
      <button id="saveApiBtn" class="btn btn-secondary">保存 API 地址</button>
      <button id="syncBrowserBtn" class="btn btn-secondary">同步浏览器设置</button>
      <button id="openAppBtn" class="btn btn-primary">在 /app 打开</button>
    </div>
  </div>

  <div class="section">
    <h2>当前页面</h2>
    <div class="row">
      <button id="saveCurrentBtn" class="btn btn-primary">保存当前链接</button>
      <button id="openQueueBtn" class="btn btn-secondary">播放列表模式</button>
      <button id="preprocessAllBtn" class="btn btn-secondary">处理视频列表</button>
      <button id="clearBtn" class="btn btn-danger">清空记录</button>
    </div>
  </div>

  <div class="list" id="todoList"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
